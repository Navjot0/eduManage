# REMOVE THIS (optional cleanup)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ==============================
# JPA / HIBERNATE
# ==============================
# Use 'validate' since schema is already created via SQL script
# Options: validate | update | create | create-drop | none
#spring.jpa.hibernate.ddl-auto=update

#spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# Disable open-in-view to avoid performance warnings
spring.jpa.open-in-view=false

# ==============================
# JACKSON (JSON)
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Kolkata

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Fix: Hibernate 6 maps UUID as varchar by default.
# This forces it to use PostgreSQL native uuid type, matching the DB schema.
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID

# ==============================
# JWT
# ==============================
# Secret must be Base64-encoded and at least 256 bits
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Access token expiry: 24 hours in milliseconds
app.jwt.expiration=86400000
# Refresh token expiry: 7 days in milliseconds
app.jwt.refresh-expiration=604800000

# ==============================
# SPRINGDOC / SWAGGER UI
# ==============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true

# ==============================
# LOGGING
# ==============================
logging.level.com.school=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file output (optional)
# logging.file.name=logs/school-management.log
# logging.file.max-size=10MB
# logging.file.max-history=30

# ==============================
# MULTIPART (File Uploads)
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ==============================
# ACTUATOR (optional health checks)
# ==============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
